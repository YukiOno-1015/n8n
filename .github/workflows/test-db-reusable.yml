name: "Test: DB Integration"

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

env:
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SQLite Pooled
            runner: ubuntu-24.04
            test-cmd: pnpm test:sqlite
            migration-cmd: pnpm test:sqlite:migrations
          - name: Postgres 16
            runner: blacksmith-4vcpu-ubuntu-2404
            test-cmd: pnpm test:postgres:integration:tc
            migration-cmd: pnpm test:postgres:migrations:tc
            TEST_IMAGE_POSTGRES: "postgres:16"
    env:
      TEST_IMAGE_POSTGRES: ${{ matrix.TEST_IMAGE_POSTGRES }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup and Build
        uses: ./.github/actions/setup-nodejs

      - name: Pre-pull Test Container Images
        run: pnpm tsx packages/testing/containers/pull-test-images.ts || true

      - name: Rebuild sqlite3 native bindings
        if: matrix.name == 'SQLite Pooled'
        working-directory: packages/cli
        run: pnpm rebuild sqlite3

      - name: Ensure sqlite3 is resolvable
        if: matrix.name == 'SQLite Pooled'
        working-directory: packages/cli
        run: |
          node -e "require('sqlite3'); require(require.resolve('sqlite3', { paths: [require('path').resolve(process.cwd(), '../@n8n/db')] }))" || (
            pnpm add sqlite3@5.1.7 --no-save && \
            (cd ../@n8n/db && pnpm add sqlite3@5.1.7 --no-save) && \
            node -e "require('sqlite3'); require(require.resolve('sqlite3', { paths: [require('path').resolve(process.cwd(), '../@n8n/db')] }))"
          )

      - name: Run Tests
        working-directory: packages/cli
        run: ${{ matrix.test-cmd }}

      - name: Run Migration Tests
        working-directory: packages/cli
        run: ${{ matrix.migration-cmd }}
