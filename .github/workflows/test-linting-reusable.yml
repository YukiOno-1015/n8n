name: "Test: Linting"

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub ref to lint.
        required: false
        type: string
        default: ""
      nodeVersion:
        description: Version of node to use.
        required: false
        type: string
        default: 24.14.1

env:
  NODE_OPTIONS: --max-old-space-size=7168

jobs:
  lint:
    name: Lint
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' &&
      'blacksmith-4vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Build and Test
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: pnpm lint:ci
          node-version: ${{ inputs.nodeVersion }}
